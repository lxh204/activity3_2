<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Thymeleaf Demo Page</title>
</head>
<body>
    <div>
        <span th:text="#{common.lang.switch}">Language</span>
        <a th:href="@{/thym-test(lang='zh_CN')}" th:text="#{common.lang.zh}">Chinese</a>
        <a th:href="@{/thym-test(lang='en_US')}" th:text="#{common.lang.en}">English</a>
    </div>

    <h1 th:text="${title}">Title</h1>

    <div>
        <p th:text="${message}">Message</p>
        <p>
            <span th:text="#{thym.currentTime}">Current timestamp</span>:
            <span th:text="${currentTime}">0</span>
        </p>
    </div>

    <div>
        <h2 th:text="#{thym.session}">Session Data</h2>
        <p>
            <span th:text="#{thym.user}">User</span>:
            <span th:text="${session.userSession}">Unknown</span>
        </p>
        <p>
            <span th:text="#{thym.loginTime}">Login time</span>:
            <span th:text="${session.loginTime}">0</span>
        </p>
    </div>

    <p>
        <a th:href="@{/home}" th:text="#{common.backHome}">Back to Home</a>
    </p>
</body>
</html>
